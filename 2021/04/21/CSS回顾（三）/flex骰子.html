<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex骰子</title>
    <style>
        .box1 {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            border: 1px solid black;
            border-radius: 5px;
        }

        .box1 div {
            width: 30%;
            height: 30%;
            background-color: black;
            border-radius: 50%;
        }

        .box2 {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100px;
            height: 100px;
            border: 1px solid black;
            border-radius: 5px;
        }

        .box2 div {
            width: 30%;
            height: 30%;
            background-color: black;
            border-radius: 50%;
        }

        .box3 {
            display: flex;
            justify-content: space-between;
            width: 100px;
            height: 100px;
            border: 1px solid black;
            border-radius: 5px;
        }

        .box3 div {
            width: 30%;
            height: 30%;
            background-color: black;
            border-radius: 50%;
        }

        .box3 :nth-child(2) {
            align-self: center;
        }

        .box3 :nth-child(3) {
            align-self: flex-end;
        }

        .box4 {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            border-radius: 5px;
        }

        .box4 li {
            width: 30%;
            height: 30%;
            background-color: black;
            border-radius: 50%;
        }

        .top,
        .end {
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 100%;
        }

        .end {
            position: relative;
            top: -30%;
        }
    </style>
</head>

<body>
    <div class="box1">
        <div></div>
    </div>
    <div class="box2">
        <div></div>
        <div></div>
    </div>
    <div class="box3">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div class="box4">
        <div class="top">
            <li></li>
            <li></li>
        </div>
        <div class="end">
            <li></li>
            <li></li>
        </div>

    </div>
</body>

</html>
