<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid骰子</title>
    <style>
        .box1,
        .box2,
        .box3,
        .box4 {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            place-items: center center;
        }

        .box1 div,
        .box2 div,
        .box3 div,
        .box4 div {
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background-color: black;
        }

        .box1 div:nth-child(1) {
            grid-area: 2/2/3/3;
        }

        .box2 div:nth-child(1) {
            grid-area: 2/1/3/2;
        }

        .box2 div:nth-child(2) {
            grid-area: 2/3/3/4;
        }

        .box3 div:nth-child(2) {
            grid-area: 2/2/3/3;
        }

        .box3 div:nth-child(3) {
            grid-area: 3/3/4/4;
        }

        .box4 div:nth-child(2) {
            grid-area: 1/3/2/4;
        }

        .box4 div:nth-child(3) {
            grid-area: 3/1/4/2;
        }

        .box4 div:nth-child(4) {
            grid-area: 3/3/4/4;
        }
    </style>
</head>

<body>
    <div class="box1">
        <div></div>
    </div>
    <div class="box2">
        <div></div>
        <div></div>
    </div>
    <div class="box3">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div class="box4">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>

</html>
