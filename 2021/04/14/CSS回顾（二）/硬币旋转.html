title: CSS回顾（二）旋转的硬币
date: 2021-04-14 16:04:57
---
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #euro {
            width: 150px;
            height: 150px;
            margin-left: -75px;
            margin-top: -75px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            animation: spin 2.5s linear infinite;
        }

        .back {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: black;
        }

        .middle {
            width: 150px;
            height: 150px;
            position: absolute;
            top: 0;
            border-radius: 50%;
            background: blue;
            transform: translateZ(1px);
        }

        .front {
            width: 150px;
            height: 150px;
            position: absolute;
            top: 0;
            border-radius: 50%;
            background: yellow;
            transform: translateZ(10px);
        }

        @keyframes spin {
            0% {
                transform: rotateY(0deg);
            }

            100% {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="euro">
        <div class="back"></div>
        <div class="middle"></div>
        <div class="front"></div>
    </div>
</body>

</html>
